name: Playwright Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'   # Daily at 6 AM UTC
  workflow_dispatch:        # Manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  test:
    name: Execute Playwright Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers with OS dependencies
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "🚀 Triggered by Pull Request. Running Smoke/Sanity Tests..."
            npm run test:smoke
          else
            echo "🔥 Triggered by ${{ github.event_name }}. Running Full Regression Tests..."
            npm run test:qa -- --project=chromium
          fi
        env:
          TEST_ENV: qa
          CI: true

      - name: Prepare report for GitHub Pages
        if: always()
        run: |
          mkdir -p reports
          if [ -f reports/custom-report.html ]; then
            cp reports/custom-report.html reports/index.html
          fi

      - name: Upload Test Report Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-custom-report
          path: reports/
          retention-days: 30

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        if: always()
        with:
          path: reports/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        if: always()

